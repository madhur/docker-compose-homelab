services:
  code-server:
    image: codercom/code-server:latest
    container_name: code-server
    # ports:
    #   - "127.0.0.1:8080:8080"
    volumes:
      - ~/.local:/home/coder/.local
      - ~/.config:/home/coder/.config
      - ~:/home/coder/project
    user: "1000:1001"
    environment:
      - DOCKER_USER=${USER}
    stdin_open: true
    networks:
      - proxy-network
    tty: true
    restart: unless-stopped
    labels:
        - "traefik.enable=true"
        - "traefik.docker.network=proxy-network"
        - "traefik.http.services.codeserver.loadbalancer.server.port=8080"

        # LAN/VPN router: no auth (higher priority)
        - "traefik.http.routers.codeserver-local.rule=Host(`code.desktop.madhur.co.in`) && (ClientIP(`192.168.1.0/24`) || ClientIP(`10.42.42.0/24`) || ClientIP(`172.22.0.0/16`))"
        - "traefik.http.routers.codeserver-local.entrypoints=websecure"
        - "traefik.http.routers.codeserver-local.tls.certresolver=letencrypt"
        - "traefik.http.routers.codeserver-local.service=codeserver"
        - "traefik.http.routers.codeserver-local.priority=10"

        # Internet router: Authentik auth (lower priority, catches everything else)
        - "traefik.http.routers.codeserver.rule=Host(`code.desktop.madhur.co.in`)"
        - "traefik.http.routers.codeserver.entrypoints=websecure"
        - "traefik.http.routers.codeserver.tls.certresolver=letencrypt"
        - "traefik.http.routers.codeserver.middlewares=authentik@file"
        - "traefik.http.routers.codeserver.service=codeserver"
        - "traefik.http.routers.codeserver.priority=1"

networks:
  proxy-network:
    external: true