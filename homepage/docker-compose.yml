services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./config:/app/config
      - ./icons:/app/public/icons
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - PUID=1000
      - PGID=1000
    networks:
      - proxy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy-network"
      - "traefik.http.services.homepage.loadbalancer.server.port=3000"

      # LAN/VPN router: no auth (higher priority)
      - "traefik.http.routers.homepage-local.rule=Host(`home.desktop.madhur.co.in`) && (ClientIP(`192.168.1.0/24`) || ClientIP(`10.42.42.0/24`) || ClientIP(`172.22.0.0/16`))"
      - "traefik.http.routers.homepage-local.entrypoints=websecure"
      - "traefik.http.routers.homepage-local.tls.certresolver=letencrypt"
      - "traefik.http.routers.homepage-local.service=homepage"
      - "traefik.http.routers.homepage-local.priority=10"

      # Internet router: Authentik auth (lower priority, catches everything else)
      - "traefik.http.routers.homepage.rule=Host(`home.desktop.madhur.co.in`)"
      - "traefik.http.routers.homepage.entrypoints=websecure"
      - "traefik.http.routers.homepage.tls.certresolver=letencrypt"
      - "traefik.http.routers.homepage.middlewares=authentik@file"
      - "traefik.http.routers.homepage.service=homepage"
      - "traefik.http.routers.homepage.priority=1"

networks:
  proxy-network:
    external: true
