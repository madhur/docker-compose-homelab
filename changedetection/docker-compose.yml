services:
  changedetection:
    image: ghcr.io/dgtlmoon/changedetection.io
    container_name: changedetection
    # ports:
    #   - "5000:5000"
    environment:
      - PLAYWRIGHT_DRIVER_URL=ws://playwright-chrome:3000
    volumes:
      - ./data:/datastore
    restart: unless-stopped
    depends_on:
      - playwright-chrome
    labels:
        - "traefik.enable=true"
        - "traefik.http.routers.changedetection.rule=Host(`cd.desktop.madhur.co.in`)"
        - "traefik.http.routers.changedetection.entrypoints=websecure"
        - "traefik.http.services.changedetection.loadbalancer.server.port=5000"
        - "traefik.http.routers.changedetection.tls.certresolver=letencrypt"
        - "traefik.docker.network=proxy-network"
        - "traefik.http.routers.changedetection.middlewares=vpn-whitelist"
        - "traefik.http.middlewares.vpn-whitelist.ipwhitelist.sourcerange=10.42.42.0/24,192.168.1.0/24"
    networks:
      - proxy-network

  playwright-chrome:
    image: browserless/chrome:latest
    container_name: playwright-chrome
    environment:
      - SCREEN_WIDTH=1920
      - SCREEN_HEIGHT=1080
      - SCREEN_DEPTH=24
      - ENABLE_DEBUGGER=false
      - PREBOOT_CHROME=true
      - CONNECTION_TIMEOUT=300000
      - MAX_CONCURRENT_SESSIONS=10
      - CHROME_REFRESH_TIME=600000
      - DEFAULT_BLOCK_ADS=true
      - DEFAULT_STEALTH=true
    restart: unless-stopped
    networks:
      - proxy-network

networks:
  proxy-network:
    external: true