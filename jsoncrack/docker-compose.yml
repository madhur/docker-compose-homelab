
services:
  app:
    build: /home/madhur/gitpersonal/jsoncrack.com
    # ports:
    #   - "3000:3000"
    restart: unless-stopped
    networks:
      - proxy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy-network"
      - "traefik.http.services.jc.loadbalancer.server.port=8080"

      # LAN/VPN router: no auth (higher priority)
      - "traefik.http.routers.jc-local.rule=Host(`jc.desktop.madhur.co.in`) && (ClientIP(`192.168.1.0/24`) || ClientIP(`10.42.42.0/24`))"
      - "traefik.http.routers.jc-local.entrypoints=websecure"
      - "traefik.http.routers.jc-local.tls.certresolver=letencrypt"
      - "traefik.http.routers.jc-local.service=jc"
      - "traefik.http.routers.jc-local.priority=10"

      # Internet router: Authentik auth (lower priority, catches everything else)
      - "traefik.http.routers.jc.rule=Host(`jc.desktop.madhur.co.in`)"
      - "traefik.http.routers.jc.entrypoints=websecure"
      - "traefik.http.routers.jc.tls.certresolver=letencrypt"
      - "traefik.http.routers.jc.middlewares=authentik@file"
      - "traefik.http.routers.jc.service=jc"
      - "traefik.http.routers.jc.priority=1"

networks:
  proxy-network:
    external: true