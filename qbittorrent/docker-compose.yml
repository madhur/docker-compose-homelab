services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - SERVER_COUNTRIES=${SERVER_COUNTRIES:-Netherlands}
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_PROVIDER=protonvpn
      - VPN_PORT_FORWARDING_UP_COMMAND=/bin/sh -c 'wget -4 -qO- --post-data="json={\"listen_port\":{{.Port}}}" "http://localhost:8080/api/v2/app/setPreferences" 2>/dev/null'
      - TZ=Asia/Kolkata
    volumes:
      - ./gluetun:/gluetun
    ports:
      - 8080:8080 # qBittorrent WebUI
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/v1/portforward | grep -v '\"port\":0' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - proxy-network

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1001
      - TZ=Asia/Kolkata
      - WEBUI_PORT=8080
    volumes:
      - ./config:/config
      - /data/downloads:/downloads
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy

  qui:
    image: ghcr.io/autobrr/qui:latest
    container_name: qui
    environment:
      - TZ=Asia/Kolkata
    volumes:
      - ./qui:/config
      - /data/downloads:/downloads
    restart: unless-stopped
    networks:
      - proxy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qui.rule=Host(`torrent.desktop.madhur.co.in`)"
      - "traefik.http.routers.qui.entrypoints=websecure"
      - "traefik.http.services.qui.loadbalancer.server.port=7476"
      - "traefik.http.routers.qui.tls.certresolver=letencrypt"
      - "traefik.docker.network=proxy-network"
      - "traefik.http.routers.qui.middlewares=vpn-whitelist"

networks:
  proxy-network:
    external: true
