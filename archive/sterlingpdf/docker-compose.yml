services:
  stirling-pdf:
    image: docker.stirlingpdf.com/stirlingtools/stirling-pdf:latest
    container_name: sterlingpdf
    # ports:
    #   - '8081:8080'
    volumes:
      - ./StirlingPDF/trainingData:/usr/share/tessdata # Required for extra OCR languages
      - ./StirlingPDF/extraConfigs:/configs
      - ./StirlingPDF/customFiles:/customFiles/
      - ./StirlingPDF/logs:/logs/
      - ./StirlingPDF/pipeline:/pipeline/
    environment:
      - DISABLE_ADDITIONAL_FEATURES=false
      - LANGS=en_GB
    networks:
      - proxy-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy-network"
      - "traefik.http.services.sterlingpdf.loadbalancer.server.port=8080"

      # LAN/VPN router: no auth (higher priority)
      - "traefik.http.routers.sterlingpdf-local.rule=Host(`pdf.desktop.madhur.co.in`) && (ClientIP(`192.168.1.0/24`) || ClientIP(`10.42.42.0/24`) || ClientIP(`172.22.0.0/16`))"
      - "traefik.http.routers.sterlingpdf-local.entrypoints=websecure"
      - "traefik.http.routers.sterlingpdf-local.tls.certresolver=letencrypt"
      - "traefik.http.routers.sterlingpdf-local.service=sterlingpdf"
      - "traefik.http.routers.sterlingpdf-local.priority=10"

      # Internet router: Authentik auth (lower priority, catches everything else)
      - "traefik.http.routers.sterlingpdf.rule=Host(`pdf.desktop.madhur.co.in`)"
      - "traefik.http.routers.sterlingpdf.entrypoints=websecure"
      - "traefik.http.routers.sterlingpdf.tls.certresolver=letencrypt"
      - "traefik.http.routers.sterlingpdf.middlewares=authelia@file"
      - "traefik.http.routers.sterlingpdf.service=sterlingpdf"
      - "traefik.http.routers.sterlingpdf.priority=1"


networks:
  proxy-network:
    external: true