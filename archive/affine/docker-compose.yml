name: affine
services:
  affine:
    image: ghcr.io/toeverything/affine:${AFFINE_REVISION:-stable}
    container_name: affine_server
    # ports:
    #   - '${PORT:-3010}:3010'
    depends_on:
      # redis:
      #   condition: service_healthy
      # postgres:
      #   condition: service_healthy
      affine_migration:
        condition: service_completed_successfully
    volumes:
      # custom configurations
      - ${UPLOAD_LOCATION}:/root/.affine/storage
      - ${CONFIG_LOCATION}:/root/.affine/config
    env_file:
      - .env
    environment:
      - REDIS_SERVER_HOST=local.madhur.co.in
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@local.madhur.co.in:5432/${DB_DATABASE:-affine}
      - AFFINE_INDEXER_ENABLED=false
    restart: unless-stopped
    networks:
      - proxy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.affine.rule=Host(`affine.desktop.madhur.co.in`)"
      - "traefik.http.routers.affine.entrypoints=websecure"
      - "traefik.http.services.affine.loadbalancer.server.port=3010"
      - "traefik.http.routers.affine.tls.certresolver=letencrypt"
      - "traefik.docker.network=proxy-network"
      - "traefik.http.routers.affine.middlewares=vpn-whitelist"
      - "traefik.http.middlewares.vpn-whitelist.ipwhitelist.sourcerange=10.42.42.0/24,192.168.1.0/24"

  affine_migration:
    image: ghcr.io/toeverything/affine:${AFFINE_REVISION:-stable}
    container_name: affine_migration_job
    restart: unless-stopped
    networks:
      - proxy-network
    volumes:
      # custom configurations
      - ${UPLOAD_LOCATION}:/root/.affine/storage
      - ${CONFIG_LOCATION}:/root/.affine/config
    command: ['sh', '-c', 'node ./scripts/self-host-predeploy.js']
    env_file:
      - .env
    environment:
      - REDIS_SERVER_HOST=local.madhur.co.in
      - DATABASE_URL=postgres://${DB_USERNAME}:${DB_PASSWORD}@local.madhur.co.in:5432/${DB_DATABASE:-affine}
      - AFFINE_INDEXER_ENABLED=false
    # depends_on:
    #   postgres:
    #     condition: service_healthy
    #   redis:
    #     condition: service_healthy

  # redis:
  #   image: redis
  #   container_name: affine_redis
  #   healthcheck:
  #     test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
  #     interval: 10s
  #     timeout: 5s
