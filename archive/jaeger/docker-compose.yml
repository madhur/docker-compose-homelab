services:
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "6831:6831/udp"
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "14250:14250"
    networks:
      - proxy-network
  hotrod:
    image: jaegertracing/example-hotrod:latest
    ports: 
      - "8085:8080"
    command: ["all"]
    environment:
      - JAEGER_AGENT_HOST=jaeger
      - JAEGER_AGENT_PORT=6831
    networks:
      - proxy-network
    depends_on:
      - jaeger


networks:
  proxy-network:
    external: true