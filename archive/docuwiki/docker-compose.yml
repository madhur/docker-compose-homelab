# This is an example of a docker-compose file for DokuWiki. Familiarity with Docker and docker-compose is assumed.
# Adjust this to your needs before using.

services:
  dokuwiki:
    image: dokuwiki/dokuwiki:master # other tags: master, <date> or <codename>
    user: "1000:1000" # adjust to your required user id
    restart: unless-stopped
    container_name: dokuwiki
    # ports:
    #   - "8080:8080" # internal port is 8080, map to what you need
    environment:
      PHP_TIMEZONE: Asia/Kolkata
      #PHP_MEMORYLIMIT: 256M
      #PHP_UPLOADLIMIT: 128M
    volumes:
      - ./storage:/storage'
    labels:
        - "traefik.enable=true"
        - "traefik.http.routers.dokuwiki.rule=Host(`dokuwiki.desktop.madhur.co.in`)"
        - "traefik.http.routers.dokuwiki.entrypoints=web"
        - "traefik.http.services.dokuwiki.loadbalancer.server.port=8080"
        - "traefik.docker.network=proxy-network"
    networks:
      - proxy-network


networks:
  proxy-network:
    external: true