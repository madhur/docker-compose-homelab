services:
  actual:
    image: actualbudget/actual-server:latest
    container_name: actual
    restart: unless-stopped
    environment:
      - TZ=Asia/Kolkata
    volumes:
      - ./data:/data
    networks:
      - proxy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy-network"
      - "traefik.http.services.actual.loadbalancer.server.port=5006"

      # LAN/VPN router: no auth (higher priority)
      - "traefik.http.routers.actual-local.rule=Host(`actual.desktop.madhur.co.in`) && (ClientIP(`192.168.1.0/24`) || ClientIP(`10.42.42.0/24`) || ClientIP(`172.22.0.0/16`))"
      - "traefik.http.routers.actual-local.entrypoints=websecure"
      - "traefik.http.routers.actual-local.tls.certresolver=letencrypt"
      - "traefik.http.routers.actual-local.service=actual"
      - "traefik.http.routers.actual-local.priority=10"

      # Internet router: Authentik auth (lower priority, catches everything else)
      - "traefik.http.routers.actual.rule=Host(`actual.desktop.madhur.co.in`)"
      - "traefik.http.routers.actual.entrypoints=websecure"
      - "traefik.http.routers.actual.tls.certresolver=letencrypt"
      - "traefik.http.routers.actual.middlewares=authentik@file"
      - "traefik.http.routers.actual.service=actual"
      - "traefik.http.routers.actual.priority=1"

networks:
  proxy-network:
    external: true
