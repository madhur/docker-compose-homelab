services:
  expenseowl:
    image: tanq16/expenseowl:main
    container_name: expenseowl
    restart: unless-stopped
    environment:
      - TZ=Asia/Kolkata
    volumes:
      - ./data:/app/data
    networks:
      - proxy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy-network"
      - "traefik.http.services.expenseowl.loadbalancer.server.port=8080"

      # LAN/VPN router: no auth (higher priority)
      - "traefik.http.routers.expenseowl-local.rule=Host(`expenseowl.desktop.madhur.co.in`) && (ClientIP(`192.168.1.0/24`) || ClientIP(`10.42.42.0/24`) || ClientIP(`172.22.0.0/16`))"
      - "traefik.http.routers.expenseowl-local.entrypoints=websecure"
      - "traefik.http.routers.expenseowl-local.tls.certresolver=letencrypt"
      - "traefik.http.routers.expenseowl-local.service=expenseowl"
      - "traefik.http.routers.expenseowl-local.priority=10"

      # Internet router: Authentik auth (lower priority, catches everything else)
      - "traefik.http.routers.expenseowl.rule=Host(`expenseowl.desktop.madhur.co.in`)"
      - "traefik.http.routers.expenseowl.entrypoints=websecure"
      - "traefik.http.routers.expenseowl.tls.certresolver=letencrypt"
      - "traefik.http.routers.expenseowl.middlewares=authelia@file"
      - "traefik.http.routers.expenseowl.service=expenseowl"
      - "traefik.http.routers.expenseowl.priority=1"

networks:
  proxy-network:
    external: true
