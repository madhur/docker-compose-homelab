services:
  invoiceninja-app:
    image: invoiceninja/invoiceninja:5
    container_name: invoiceninja-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=invoiceninja-db
      - DB_PORT=3306
      - DB_DATABASE=invoiceninja
      - DB_USERNAME=invoiceninja
      - QUEUE_CONNECTION=database
      - SESSION_DRIVER=file
      - TRUSTED_PROXIES=*
    volumes:
      - ./public:/var/www/app/public
      - ./storage:/var/www/app/storage
    networks:
      - proxy-network
    depends_on:
      invoiceninja-db:
        condition: service_healthy

  invoiceninja-nginx:
    image: nginx:alpine
    container_name: invoiceninja-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/app/public:ro
    networks:
      - proxy-network
    depends_on:
      - invoiceninja-app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.invoiceninja.rule=Host(`invoiceninja.desktop.madhur.co.in`)"
      - "traefik.http.routers.invoiceninja.entrypoints=websecure"
      - "traefik.http.routers.invoiceninja.tls.certresolver=letencrypt"
      - "traefik.http.services.invoiceninja.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy-network"

  invoiceninja-db:
    image: mysql:8
    container_name: invoiceninja-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=invoiceninja
      - MYSQL_USER=invoiceninja
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./mysql:/var/lib/mysql
    networks:
      - proxy-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  proxy-network:
    external: true
