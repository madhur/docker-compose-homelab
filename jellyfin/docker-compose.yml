services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Kolkata
    volumes:
      - ./config:/config
      - /data/downloads:/media  # Adjust this path to where your media is stored
      - /home/madhur/Videos:/media4  # Adjust this path to where your media is stored
      - /home/madhur/Screenshots/Timeline:/media2  # Adjust this path to where your media is stored
      - /data/be_discussions:/media3  # Adjust this path to where your media is stored      - ./cache:/cache
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu, compute, video]
    networks:
      - proxy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy-network"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"

      # LAN/VPN router: no auth (higher priority)
      - "traefik.http.routers.jellyfin-local.rule=Host(`jf.desktop.madhur.co.in`) && (ClientIP(`192.168.1.0/24`) || ClientIP(`10.42.42.0/24`) || ClientIP(`172.22.0.0/16`))"
      - "traefik.http.routers.jellyfin-local.entrypoints=websecure"
      - "traefik.http.routers.jellyfin-local.tls.certresolver=letencrypt"
      - "traefik.http.routers.jellyfin-local.service=jellyfin"
      - "traefik.http.routers.jellyfin-local.priority=10"

      # Internet router: Authentik auth (lower priority, catches everything else)
      - "traefik.http.routers.jellyfin.rule=Host(`jf.desktop.madhur.co.in`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls.certresolver=letencrypt"
      - "traefik.http.routers.jellyfin.middlewares=authelia@file"
      - "traefik.http.routers.jellyfin.service=jellyfin"
      - "traefik.http.routers.jellyfin.priority=1"

networks:
  proxy-network:
    external: true
