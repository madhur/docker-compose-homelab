services:
  docmost:
    image: docmost/docmost:latest
    container_name: docmost
    depends_on:
      - db
      - redis
    environment:
      APP_URL: "http://localhost:3000"
      APP_SECRET: "1bd8750a-e6b5-4a1a-b8e9-937ead22fd22"
      DATABASE_URL: "postgresql://docmost:STRONG_DB_PASSWORD@db:5432/docmost?schema=public"
      REDIS_URL: "redis://redis:6379"
    # ports:
    #   - "3000:3000"
    restart: unless-stopped
    volumes:
      - docmost:/app/data/storage
    labels:
        - "traefik.enable=true"
        - "traefik.http.routers.docmost.rule=Host(`docmost.desktop.madhur.co.in`)"
        - "traefik.http.routers.docmost.entrypoints=web"
        - "traefik.http.services.docmost.loadbalancer.server.port=3000"
        - "traefik.docker.network=proxy-network"
    networks:
      - proxy-network

  db:
    image: postgres:16-alpine
    container_name: docmost_db
    environment:
      POSTGRES_DB: docmost
      POSTGRES_USER: docmost
      POSTGRES_PASSWORD: STRONG_DB_PASSWORD
    restart: unless-stopped
    networks:
      - proxy-network
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    container_name: docmost_redis
    image: redis:7.2-alpine
    restart: unless-stopped
    networks:
      - proxy-network
    volumes:
      - redis_data:/data

volumes:
  docmost:
  db_data:
  redis_data:

networks:
  proxy-network:
    external: true