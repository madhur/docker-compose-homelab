services:
  bookstack:
    image: lscr.io/linuxserver/bookstack
    container_name: bookstack
    environment:
      - PUID=1000
      - PGID=1000
      - APP_URL=https://bookstack.desktop.madhur.co.in
      - APP_KEY=base64:3qjlIoUX4Tw6fUQgZcxMbz6lb8+dAzqpvItqHvahW1c=
      - DB_HOST=bookstack_db
      - DB_PORT=3306
      - DB_USERNAME=bookstack
      - DB_PASSWORD=supersecretpassword
      - DB_DATABASE=bookstackapp
    volumes:
      - ./bookstack_app_data:/config
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy-network"
      - "traefik.http.services.bookstack.loadbalancer.server.port=80"

      # LAN/VPN router: no auth (higher priority)
      - "traefik.http.routers.bookstack-local.rule=Host(`bookstack.desktop.madhur.co.in`) && (ClientIP(`192.168.1.0/24`) || ClientIP(`10.42.42.0/24`) || ClientIP(`172.22.0.0/16`))"
      - "traefik.http.routers.bookstack-local.entrypoints=websecure"
      - "traefik.http.routers.bookstack-local.tls.certresolver=letencrypt"
      - "traefik.http.routers.bookstack-local.service=bookstack"
      - "traefik.http.routers.bookstack-local.priority=10"

      # Internet router: Tinyauth/PocketID auth (lower priority, catches everything else)
      - "traefik.http.routers.bookstack.rule=Host(`bookstack.desktop.madhur.co.in`)"
      - "traefik.http.routers.bookstack.entrypoints=websecure"
      - "traefik.http.routers.bookstack.tls.certresolver=letencrypt"
      - "traefik.http.routers.bookstack.middlewares=authelia@file"
      - "traefik.http.routers.bookstack.service=bookstack"
      - "traefik.http.routers.bookstack.priority=1"
    networks:
      - proxy-network
    ports:
      - 6875:80
    restart: unless-stopped
    depends_on:
      - bookstack_db


  bookstack_db:
    image: lscr.io/linuxserver/mariadb
    container_name: bookstack_db
    networks:
      - proxy-network
    environment:
      - PUID=1000
      - PGID=1000
      - MYSQL_ROOT_PASSWORD=supersecretpassword
      - TZ=Asia/Kolkata
      - MYSQL_DATABASE=bookstackapp
      - MYSQL_USER=bookstack
      - MYSQL_PASSWORD=supersecretpassword
    volumes:
      - ./bookstack_db_data:/config
    restart: unless-stopped
    ports:
      - 3307:3306

networks:
  proxy-network:
    external: true