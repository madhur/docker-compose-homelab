services:
  dockpeek:
    image: ghcr.io/dockpeek/dockpeek:latest
    container_name: dockpeek
    environment:
      - SECRET_KEY=your_secure_secret_key # Required: Set a secure secret key
      - USERNAME=admin # username
      - PASSWORD=password # password
      - DISABLE_AUTH=true
    # ports:
    #   - "3420:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dockpeek.rule=Host(`dockpeek.desktop.madhur.co.in`)"
      - "traefik.http.routers.dockpeek.entrypoints=websecure"
      - "traefik.http.routers.dockpeek.tls.certresolver=letencrypt"
      - "traefik.http.services.dockpeek.loadbalancer.server.port=8000"
      - "traefik.docker.network=proxy-network"
    networks:
      - proxy-network

networks:
  proxy-network:
    external: true