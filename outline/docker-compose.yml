services:
  outline:
    image: docker.getoutline.com/outlinewiki/outline:latest
    container_name: outline
    restart: unless-stopped
    env_file: ./docker.env
    # expose:
    #   - "3000"
    volumes:
      - ./storage-data:/var/lib/outline/data
    labels:
        - "traefik.enable=true"
        - "traefik.http.routers.outline.rule=Host(`outline.desktop.madhur.co.in`)"
        - "traefik.http.routers.outline.entrypoints=websecure"
        - "traefik.http.routers.outline.tls.certresolver=letencrypt"
        - "traefik.http.services.outline.loadbalancer.server.port=3000"
        - "traefik.docker.network=proxy-network"
        - "traefik.http.routers.outline.middlewares=vpn-whitelist"
        - "traefik.http.middlewares.vpn-whitelist.ipwhitelist.sourcerange=10.42.42.0/24,192.168.1.0/24"
    networks:
      - proxy-network
    # depends_on:
