services:
  rednotebook:
    build:
      context: /home/madhur/gitpersonal/rednotebook-web
      dockerfile: Dockerfile
    image: rednotebook-web:latest
    container_name: rednotebook
    restart: unless-stopped
    user: "1000:1001"
    environment:
      - TZ=Asia/Kolkata
      - REDNOTEBOOK_DATA_DIR=/data
    volumes:
      - /home/madhur/.rednotebook/data:/data
    networks:
      - proxy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy-network"
      - "traefik.http.services.rednotebook.loadbalancer.server.port=8000"

      # LAN/VPN router: no auth (higher priority)
      - "traefik.http.routers.rednotebook-local.rule=Host(`rb.desktop.madhur.co.in`) && (ClientIP(`192.168.1.0/24`) || ClientIP(`10.42.42.0/24`) || ClientIP(`172.22.0.0/16`))"
      - "traefik.http.routers.rednotebook-local.entrypoints=websecure"
      - "traefik.http.routers.rednotebook-local.tls.certresolver=letencrypt"
      - "traefik.http.routers.rednotebook-local.service=rednotebook"
      - "traefik.http.routers.rednotebook-local.priority=10"

      # Internet router: Authentik auth (lower priority, catches everything else)
      - "traefik.http.routers.rednotebook.rule=Host(`rb.desktop.madhur.co.in`)"
      - "traefik.http.routers.rednotebook.entrypoints=websecure"
      - "traefik.http.routers.rednotebook.tls.certresolver=letencrypt"
      - "traefik.http.routers.rednotebook.middlewares=authelia@file"
      - "traefik.http.routers.rednotebook.service=rednotebook"
      - "traefik.http.routers.rednotebook.priority=1"

networks:
  proxy-network:
    external: true
