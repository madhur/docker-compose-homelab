services:
  opengist:
    image: ghcr.io/thomiceli/opengist:1.11
    container_name: opengist
    restart: unless-stopped
    # ports:
    #   - "6157:6157" # HTTP port
    #   - "2222:2222" # SSH port, can be removed if you don't use SSH
    volumes:
      - "./data:/opengist"
    networks:
      - proxy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy-network"
      - "traefik.http.services.opengist.loadbalancer.server.port=6157"

      # LAN/VPN router: no auth (higher priority)
      - "traefik.http.routers.opengist-local.rule=Host(`og.desktop.madhur.co.in`) && (ClientIP(`192.168.1.0/24`) || ClientIP(`10.42.42.0/24`) || ClientIP(`172.22.0.0/16`))"
      - "traefik.http.routers.opengist-local.entrypoints=websecure"
      - "traefik.http.routers.opengist-local.tls.certresolver=letencrypt"
      - "traefik.http.routers.opengist-local.service=opengist"
      - "traefik.http.routers.opengist-local.priority=10"

      # Internet router: Authentik auth (lower priority, catches everything else)
      - "traefik.http.routers.opengist.rule=Host(`og.desktop.madhur.co.in`)"
      - "traefik.http.routers.opengist.entrypoints=websecure"
      - "traefik.http.routers.opengist.tls.certresolver=letencrypt"
      - "traefik.http.routers.opengist.middlewares=authelia@file"
      - "traefik.http.routers.opengist.service=opengist"
      - "traefik.http.routers.opengist.priority=1"



networks:
  proxy-network:
    external: true