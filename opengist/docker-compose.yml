services:
  opengist:
    image: ghcr.io/thomiceli/opengist:1.11
    container_name: opengist
    restart: unless-stopped
    # ports:
    #   - "6157:6157" # HTTP port
    #   - "2222:2222" # SSH port, can be removed if you don't use SSH
    volumes:
      - "./data:/opengist"
    networks:
      - proxy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.opengist.rule=Host(`og.desktop.madhur.co.in`)"
      - "traefik.http.routers.opengist.entrypoints=websecure"
      - "traefik.http.services.opengist.loadbalancer.server.port=6157"
      - "traefik.http.routers.opengist.tls.certresolver=letencrypt"
      - "traefik.docker.network=proxy-network"
      - "traefik.http.routers.opengist.middlewares=vpn-whitelist"
      - "traefik.http.middlewares.vpn-whitelist.ipwhitelist.sourcerange=10.42.42.0/24,192.168.1.0/24"



networks:
  proxy-network:
    external: true